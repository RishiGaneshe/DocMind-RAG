services:
  postgres:
    image: postgres:16-alpine
    container_name: rag-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rag_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: rag-redis
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama
    container_name: rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: /bin/sh
    command: -c "ollama serve & sleep 5 && ollama pull nomic-embed-text && wait"

  rag-app:
    build: .
    container_name: rag-app
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - OLLAMA_URL=http://ollama:11434/api/embeddings
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/rag_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
      - ollama

volumes:
  postgres_data:
  ollama_data:
